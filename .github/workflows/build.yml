name: Build MonitorTweak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV

          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

          # Download prebuilt iOS SDKs (theos/sdks releases)
          curl -fsSL https://github.com/theos/sdks/archive/refs/heads/master.zip -o /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp/sdks-extracted
          mv /tmp/sdks-extracted/sdks-master/*.sdk $THEOS/sdks/

          # Install ldid for code signing
          brew install ldid 2>/dev/null || true

          echo "[*] Theos ready at $THEOS"
          ls $THEOS/sdks/

      - name: Build dylib
        run: |
          make clean
          make FINALPACKAGE=1 DEBUG=0

      - name: Locate dylib
        id: locate
        run: |
          DYLIB=$(find .theos/obj -name "MonitorTweak.dylib" | head -1)
          echo "path=$DYLIB" >> $GITHUB_OUTPUT
          echo "Found: $DYLIB"
          ls -lh "$DYLIB"

      # Wrap in zip before uploading so that extraction on Windows preserves
      # the original build timestamp (direct .dylib download resets mtime).
      - name: Package dylib as zip
        id: package
        run: |
          DYLIB="${{ steps.locate.outputs.path }}"
          ZIP="MonitorTweak.zip"
          # -X: no extra attributes  -j: junk path (file only, no subdirs)
          zip -X -j "$ZIP" "$DYLIB"
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          ls -lh "$ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonitorTweak-${{ github.ref_name }}
          path: ${{ steps.package.outputs.zip }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          name: MonitorTweak ${{ github.ref_name }}
          body: |
            MonitorTweak dylib for pecker-agent iOS Tweak mode.

            ## Install
            Download `MonitorTweak.zip`, extract to get `MonitorTweak.dylib`,
            then set `ios.tweak_dylib_path` in relay config.

            The zip preserves the build timestamp — do not rename or re-zip the dylib.
